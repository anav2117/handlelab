<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab Pro - Compartir</title>
    <style>
        body { background: #060810; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; border: 2px solid #ff6600; padding: 20px; border-radius: 25px; background: rgba(20,20,25,0.9); text-align: center; }
        input { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; border-radius: 8px; }
        #timer { font-size: 3rem; color: #ff6600; font-weight: bold; }
        #counter { font-size: 1.5rem; color: #ff9933; margin: 10px 0; }
        .btn { background: #ff6600; color: black; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-share { background: #333; color: white; }
        #historial { margin-top: 20px; font-size: 0.9rem; text-align: left; color: #aaa; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HandleLab</h1>
        <input type="text" id="username" placeholder="Nombre del jugador" onchange="usuario = this.value">
        <input type="number" id="custom-time" value="60">
        <div id="timer">00:00</div>
        <div id="counter">Botes: 0</div>
        <button class="btn" onclick="iniciarEntrenamiento()">INICIAR ENTRENAMIENTO</button>
        <button class="btn btn-share" onclick="compartirResultados()">COMPARTIR SESIÓN</button>
        <div id="historial"><h3>Últimas sesiones:</h3><ul id="lista-sesiones"></ul></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let botes = 0, usuario = "Invitado", timer = null;
        
        window.onload = mostrarHistorial;

        const motivaciones = [
            "¡Mantén la mirada al frente, no mires el balón!",
            "¡Trabaja con la punta de los dedos!",
            "¡Baja el centro de gravedad, mantente fuerte!",
            "¡Control total del balón!",
            "¡Sigue trabajando ese crossover!",
            "¡Eso es, explota en cada bote!"
        ];

        function playSound() {
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 400;
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function coachSay(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function iniciarEntrenamiento() {
            botes = 0;
            let tiempo = parseInt(document.getElementById('custom-time').value);
            document.getElementById('counter').innerText = "Botes: 0";
            
            timer = setInterval(() => {
                botes++;
                playSound();
                document.getElementById('counter').innerText = "Botes: " + botes;
                if (botes > 0 && botes % 25 === 0) { 
                    coachSay(motivaciones[Math.floor(Math.random() * motivaciones.length)]);
                }
                if (--tiempo <= 0) {
                    clearInterval(timer);
                    guardarSesion();
                    coachSay("¡Tiempo terminado! Gran sesión.");
                }
            }, 1000);
        }

        function compartirResultados() {
            const tiempo = document.getElementById('custom-time').value;
            const texto = `🏀 ¡HandleLab! Mi sesión de hoy: ${botes} botes en ${tiempo} segundos. ¡Atrévete a superarme!`;
            if (navigator.share) {
                navigator.share({ title: 'Mi récord HandleLab', text: texto });
            } else {
                prompt("Copia este mensaje para compartir:", texto);
            }
        }

        function guardarSesion() {
            let historial = JSON.parse(localStorage.getItem('historialHandleLab') || "[]");
            historial.unshift({ usuario, botes, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('historialHandleLab', JSON.stringify(historial.slice(0, 5)));
            mostrarHistorial();
        }

        function mostrarHistorial() {
            const lista = document.getElementById('lista-sesiones');
            lista.innerHTML = "";
            let historial = JSON.parse(localStorage.getItem('historialHandleLab') || "[]");
            historial.forEach(s => {
                lista.innerHTML += `<li>${s.fecha} - ${s.usuario}: ${s.botes} botes</li>`;
            });
        }
    </script>
</body>
</html>
