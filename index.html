<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        body { margin: 0; background-color: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #app { width: 100%; max-width: 400px; }
        .box { border: 2px solid #ff6600; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.5); text-align: center; }
        #lang-selector { margin-bottom: 15px; background: #222; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 5px; }
        h1 { color: #ff6600; margin-top: 0; }
        #timer { font-size: 3rem; margin: 5px 0; color: #fff; font-weight: bold; }
        #status { font-size: 1.2rem; color: #ffcc00; margin-bottom: 10px; height: 25px; }
        #counter { font-size: 1.5rem; color: #ff9933; margin-bottom: 15px; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .level-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; }
        .level-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stop-btn { background: #550000; border: 1px solid #770000; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="box">
            <select id="lang-selector" onchange="cambiarIdioma(this.value)">
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
            <h1 id="title">HandleLab</h1>
            <div id="status">Select a level</div>
            <div id="timer">00:00</div>
            <div id="counter">Dribbles: 0</div>
            <div class="level-grid" id="grid">
                <button class="level-btn" onclick="iniciarNivel(1, 90, 60, 'lv1')">Level 1</button>
                <button class="level-btn" onclick="iniciarNivel(2, 90, 60, 'lv2')">Level 2</button>
                <button class="level-btn" onclick="iniciarNivel(3, 110, 45, 'lv3')">Level 3</button>
                <button class="level-btn" onclick="iniciarNivel(4, 130, 30, 'lv4')">Level 4</button>
            </div>
            <button class="stop-btn" onclick="detenerEntrenamiento()">STOP</button>
        </div>
    </div>

    <script>
        let idiomaActual = 'en';
        const textos = {
            en: { statusSelect: "Select a level", statusRunning: "Running: Level ", statusDone: "Level complete!", statusPaused: "Training stopped", botes: "Dribbles: ", descanso: "Great! You finished with %s dribbles. Rest for 15 seconds.", descansoFin: "Rest finished. Ready for the next level!", levels: ["Level 1, right hand.", "Level 2, left hand.", "Level 3, alternate hands.", "Level 4, high intensity."] },
            es: { statusSelect: "Selecciona un nivel", statusRunning: "Ejecutando: Nivel ", statusDone: "¡Nivel completado!", statusPaused: "Entrenamiento detenido", botes: "Botes: ", descanso: "¡Excelente! Terminaste con %s botes. Descansa 15 segundos.", descansoFin: "Descanso terminado. ¡Listo para el siguiente nivel!", levels: ["Nivel 1, mano derecha.", "Nivel 2, mano izquierda.", "Nivel 3, alterna manos.", "Nivel 4, alta intensidad."] }
        };

        function cambiarIdioma(lang) {
            idiomaActual = lang;
            document.getElementById('status').innerText = textos[idiomaActual].statusSelect;
            document.getElementById('counter').innerText = textos[idiomaActual].botes + botes;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let interval = null, timerInterval = null, timeLeft = 0, botes = 0, descansando = false;

        function decir(key, valor = "") {
            window.speechSynthesis.cancel();
            let mensaje = textos[idiomaActual][key];
            if (valor !== "") mensaje = mensaje.replace("%s", valor);
            
            const msg = new SpeechSynthesisUtterance(mensaje);
            msg.lang = (idiomaActual === 'es') ? 'es-ES' : 'en-US';
            const voces = window.speechSynthesis.getVoices();
            msg.voice = voces.find(v => (v.name.toLowerCase().includes("male") || v.name.toLowerCase().includes("masculino")) && v.lang.toLowerCase().includes(idiomaActual)) || voces[0];
            window.speechSynthesis.speak(msg);
        }

        function iniciarNivel(num, bpm, duracion, instrKey) {
            if (descansando) return;
            detenerEntrenamiento();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            timeLeft = duracion;
            botes = 0;
            document.getElementById('status').innerText = textos[idiomaActual].statusRunning + num;
            document.getElementById('counter').innerText = textos[idiomaActual].botes + "0";
            
            decirRaw(textos[idiomaActual].levels[num-1]);
            
            interval = setInterval(() => {
                botes++;
                document.getElementById('counter').innerText = textos[idiomaActual].botes + botes;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 150;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }, (60000 / bpm));

            timerInterval = setInterval(actualizarTemporizador, 1000);
            actualizarTemporizador();
        }

        function decirRaw(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = (idiomaActual === 'es') ? 'es-ES' : 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function actualizarTemporizador() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) finalizarNivel();
            else timeLeft--;
        }

        function finalizarNivel() {
            detenerEntrenamiento();
            descansando = true;
            document.getElementById('status').innerText = textos[idiomaActual].statusDone;
            document.querySelectorAll('.level-btn').forEach(b => b.disabled = true);
            decir('descanso', botes);
            
            let descanso = 15;
            let dInt = setInterval(() => {
                document.getElementById('timer').innerText = `D: ${descanso--}`;
                if (descanso < 0) {
                    clearInterval(dInt);
                    descansando = false;
                    document.getElementById('status').innerText = textos[idiomaActual].statusSelect;
                    document.getElementById('timer').innerText = "00:00";
                    document.querySelectorAll('.level-btn').forEach(b => b.disabled = false);
                    decirRaw(textos[idiomaActual].descansoFin);
                }
            }, 1000);
        }

        function detenerEntrenamiento() {
            clearInterval(interval);
            clearInterval(timerInterval);
            if (!descansando) document.getElementById('status').innerText = textos[idiomaActual].statusPaused;
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
