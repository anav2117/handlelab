<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        /* Estilos Generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #060810;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #060810;
        }

        /* Sistema de Pantallas y Transiciones (Fade) */
        .screen {
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* Selector de Idioma Flotante */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(255, 102, 0, 0.4);
            color: #ff8833;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .lang-switch:active {
            transform: scale(0.95);
            background: #ff6600;
            color: #ffffff;
        }

        /* PANTALLA 1: PORTADA CON TU IMAGEN DE FONDO */
        #screen-welcome {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 50%, rgba(6,8,16,0.95) 90%), url('Screenshot_20260715_094703_ChatGPT.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: flex-end;
            padding-bottom: 60px;
        }

        /* Botón START */
        .btn-gradient {
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 50%, #cc0000 100%);
            color: #ffffff;
            border: none;
            padding: 16px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .btn-gradient:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }

        /* PANTALLA 2: REGISTRO PREMIUM */
        #screen-register {
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at center, #111625 0%, #060810 100%);
            overflow-y: auto;
        }

        .card {
            background: rgba(15, 20, 35, 0.85);
            border: 1px solid rgba(255, 102, 0, 0.25);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 102, 0, 0.05);
            text-align: center;
        }

        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.6));
            animation: pulse-fire 1.5s infinite alternate;
        }

        @keyframes pulse-fire {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .card h2 {
            margin: 0 0 8px 0;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 30%, #ff8833 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0 0 28px 0;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #ff8833;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            background-color: #090d16;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 12px rgba(255, 102, 0, 0.25);
            background-color: #0d1321;
        }

        .form-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Botón de envío Premium */
        .btn-submit {
            background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255, 85, 0, 0.2);
        }

        /* PANTALLA 3: DASHBOARD PRINCIPAL */
        #screen-dashboard {
            background: linear-gradient(180deg, #090d16 0%, #060810 100%);
            padding: 30px 24px;
            justify-content: flex-start;
            overflow-y: auto;
            align-items: stretch;
        }

        .dashboard-header {
            margin-bottom: 24px;
            text-align: left;
            margin-top: 30px; /* Margen para no chocar con el botón de idioma */
        }

        .dashboard-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .dashboard-header p {
            font-size: 0.9rem;
            color: #64748b;
            margin: 4px 0 0 0;
        }

        /* Tarjeta de Estadísticas del Atleta */
        .athlete-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 102, 0, 0.15);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .athlete-stat {
            text-align: left;
        }

        .athlete-stat .stat-label {
            font-size: 0.75rem;
            color: #ff8833;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .athlete-stat .stat-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            margin-top: 2px;
        }

        /* Botones de Entrenamiento (Módulos) */
        .menu-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            text-align: left;
        }

        .training-card {
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(255, 102, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-align: left;
        }

        .training-card:active {
            transform: scale(0.97);
            border-color: #ff6600;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.15);
        }

        .training-icon {
            font-size: 2rem;
            margin-right: 18px;
            filter: drop-shadow(0 0 6px rgba(255, 102, 0, 0.4));
        }

        .training-info {
            flex-grow: 1;
        }

        .training-info h3 {
            font-size: 1.15rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .training-info p {
            font-size: 0.8rem;
            color: #64748b;
            margin: 0;
            line-height: 1.3;
        }

        .arrow-indicator {
            color: #ff6600;
            font-weight: 900;
            font-size: 1.2rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Botón Selector de Idioma Flotante -->
        <button class="lang-switch" id="lang-toggle">ES</button>
        
        <!-- PANTALLA 1: PORTADA CON IMAGEN DE FONDO -->
        <div id="screen-welcome" class="screen active">
            <button class="btn-gradient" id="btn-start">START</button>
        </div>

        <!-- PANTALLA 2: REGISTRO PREMIUM -->
        <div id="screen-register" class="screen">
            <div class="card">
                <div class="card-icon">🔥</div>
                <h2 id="reg-title">Create Profile</h2>
                <p id="reg-subtitle">Configure your AI training</p>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="alias" id="label-alias">Name / Alias</label>
                        <input type="text" id="alias" placeholder="e.g. Baller99" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="age" id="label-age">Age</label>
                        <input type="number" id="age" min="5" max="99" placeholder="Your age" required>
                    </div>

                    <!-- Dos columnas: Mano dominante e Idioma -->
                    <div class="form-options">
                        <div class="form-group">
                            <label for="hand" id="label-hand">Dominant Hand</label>
                            <select id="hand" required>
                                <option value="right" id="opt-right">Right Hand</option>
                                <option value="left" id="opt-left">Left Hand</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="lang" id="label-lang">Language</label>
                            <select id="lang" required>
                                <option value="en" id="opt-lang-en">English</option>
                                <option value="es" id="opt-lang-es">Spanish</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-submit-text">Save & Start</button>
                </form>
            </div>
        </div>

        <!-- PANTALLA 3: DASHBOARD PRINCIPAL -->
        <div id="screen-dashboard" class="screen">
            <div class="dashboard-header">
                <h1 id="dash-welcome">Welcome, Player!</h1>
                <p id="dash-subtitle">Ready to master your ball handling?</p>
            </div>

            <!-- Ficha de Estado del Atleta -->
            <div class="athlete-card">
                <div class="athlete-stat">
                    <div class="stat-label" id="stat-hand-label">Hand</div>
                    <div class="stat-val" id="stat-hand-val">Right</div>
                </div>
                <div class="athlete-stat" style="text-align: right;">
                    <div class="stat-label" id="stat-streak-label">Streak</div>
                    <div class="stat-val" id="stat-streak-val">🔥 1 Day</div>
                </div>
            </div>

            <div class="menu-title" id="dash-menu-title">Training Modules</div>

            <!-- Módulo 1: Rhythm Control -->
            <div class="training-card" onclick="alert('Dribble rhythm module starting soon!')">
                <div class="training-icon">🎵</div>
                <div class="training-info">
                    <h3 id="mod1-title">Rhythm Control</h3>
                    <p id="mod1-desc">Analyze your dribbling rhythm & sync with tempo</p>
                </div>
                <div class="arrow-indicator">➔</div>
            </div>

            <!-- Módulo 2: Hand Speed -->
            <div class="training-card" onclick="alert('Hand speed tracker coming soon!')">
                <div class="training-icon">⚡</div>
                <div class="training-info">
                    <h3 id="mod2-title">Hand Speed</h3>
                    <p id="mod2-desc">Track real-time velocity and hand positioning</p>
                </div>
                <div class="arrow-indicator">➔</div>
            </div>
        </div>

    </div>

    <script>
        // Sistema de Idiomas (Diccionario de traducciones)
        const translations = {
            en: {
                langButton: "ES",
                startBtn: "START",
                regTitle: "Create Profile",
                regSubtitle: "Configure your AI training",
                labelAlias: "Name / Alias",
                placeholderAlias: "e.g. Baller99",
                labelAge: "Age",
                placeholderAge: "Your age",
                labelHand: "Dominant Hand",
                optRight: "Right Hand",
                optLeft: "Left Hand",
                labelLang: "Language",
                optLangEn: "English",
                optLangEs: "Spanish",
                btnSubmit: "Save & Start",
                dashWelcome: "Welcome, {name}!",
                dashSubtitle: "Ready to master your ball handling?",
                statHandLabel: "Dominant Hand",
                statStreakLabel: "Daily Streak",
                streakVal: "🔥 1 Day",
                handRightVal: "Right",
                handLeftVal: "Left",
                dashMenuTitle: "Training Modules",
                mod1Title: "Rhythm Control",
                mod1Desc: "Analyze your dribbling rhythm & sync with tempo",
                mod2Title: "Hand Speed",
                mod2Desc: "Track real-time velocity and hand positioning"
            },
            es: {
                langButton: "EN",
                startBtn: "EMPEZAR",
                regTitle: "Crea tu Perfil",
                regSubtitle: "Configura tu entrenamiento de IA",
                labelAlias: "Nombre / Alias",
                placeholderAlias: "Ej. Baller99",
                labelAge: "Edad",
                placeholderAge: "Tu edad",
                labelHand: "Mano Hábil",
                optRight: "Mano Derecha",
                optLeft: "Mano Izquierda",
                labelLang: "Idioma",
                optLangEn: "Inglés",
                optLangEs: "Español",
                btnSubmit: "Guardar y Empezar",
                dashWelcome: "¡Bienvenido, {name}!",
                dashSubtitle: "¿Listo para dominar tu control de balón?",
                statHandLabel: "Mano Hábil",
                statStreakLabel: "Racha Diaria",
                streakVal: "🔥 1 Día",
                handRightVal: "Derecha",
                handLeftVal: "Izquierda",
                dashMenuTitle: "Módulos de Práctica",
                mod1Title: "Control de Ritmo",
                mod1Desc: "Analiza tu ritmo de bote y sincronízate con el tempo",
                mod2Title: "Velocidad de Mano",
                mod2Desc: "Rastrea la velocidad real y posición de manos"
            }
        };

        let currentLang = 'en'; // Inglés por defecto
        let savedProfile = null;

        // Elementos interactivos de la traducción
        const langToggle = document.getElementById('lang-toggle');
        const btnStart = document.getElementById('btn-start');
        const regTitle = document.getElementById('reg-title');
        const regSubtitle = document.getElementById('reg-subtitle');
        const labelAlias = document.getElementById('label-alias');
        const inputAlias = document.getElementById('alias');
        const labelAge = document.getElementById('label-age');
        const inputAge = document.getElementById('age');
        const labelHand = document.getElementById('label-hand');
        const optRight = document.getElementById('opt-right');
        const optLeft = document.getElementById('opt-left');
        const labelLang = document.getElementById('label-lang');
        const optLangEn = document.getElementById('opt-lang-en');
        const optLangEs = document.getElementById('opt-lang-es');
        const btnSubmitText = document.getElementById('btn-submit-text');
        const selectLangInput = document.getElementById('lang');

        // Elementos del Dashboard
        const dashWelcome = document.getElementById('dash-welcome');
        const dashSubtitle = document.getElementById('dash-subtitle');
        const statHandLabel = document.getElementById('stat-hand-label');
        const statHandVal = document.getElementById('stat-hand-val');
        const statStreakLabel = document.getElementById('stat-streak-label');
        const statStreakVal = document.getElementById('stat-streak-val');
        const dashMenuTitle = document.getElementById('dash-menu-title');
        const mod1Title = document.getElementById('mod1-title');
        const mod1Desc = document.getElementById('mod1-desc');
        const mod2Title = document.getElementById('mod2-title');
        const mod2Desc = document.getElementById('mod2-desc');

        // Función para cambiar textos en la UI
        function updateLanguage(lang) {
            currentLang = lang;
            langToggle.textContent = translations[lang].langButton;
            btnStart.textContent = translations[lang].startBtn;
            regTitle.textContent = translations[lang].regTitle;
            regSubtitle.textContent = translations[lang].regSubtitle;
            labelAlias.textContent = translations[lang].labelAlias;
            inputAlias.placeholder = translations[lang].placeholderAlias;
            labelAge.textContent = translations[lang].labelAge;
            inputAge.placeholder = translations[lang].placeholderAge;
            labelHand.textContent = translations[lang].labelHand;
            optRight.textContent = translations[lang].optRight;
            optLeft.textContent = translations[lang].optLeft;
            labelLang.textContent = translations[lang].labelLang;
            optLangEn.textContent = translations[lang].optLangEn;
            optLangEs.textContent = translations[lang].optLangEs;
            btnSubmitText.textContent = translations[lang].btnSubmit;
            
            // Sincronizar el selector del formulario
            selectLangInput.value = lang;

            // Actualizar textos del Dashboard si hay un perfil activo
            if (savedProfile) {
                dashWelcome.textContent = translations[lang].dashWelcome.replace('{name}', savedProfile.alias);
                dashSubtitle.textContent = translations[lang].dashSubtitle;
                statHandLabel.textContent = translations[lang].statHandLabel;
                statStreakLabel.textContent = translations[lang].statStreakLabel;
                statStreakVal.textContent = translations[lang].streakVal;
                
                const handKey = savedProfile.hand === 'right' ? 'handRightVal' : 'handLeftVal';
                statHandVal.textContent = translations[lang][handKey];
                
                dashMenuTitle.textContent = translations[lang].dashMenuTitle;
                mod1Title.textContent = translations[lang].mod1Title;
                mod1Desc.textContent = translations[lang].mod1Desc;
                mod2Title.textContent = translations[lang].mod2Title;
                mod2Desc.textContent = translations[lang].mod2Desc;
            }
        }

        // Cambiar idioma con el botón flotante
        langToggle.addEventListener('click', () => {
            const nextLang = currentLang === 'en' ? 'es' : 'en';
            updateLanguage(nextLang);
        });

        // Cambiar idioma desde el formulario
        selectLangInput.addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        // Lógica de navegación entre pantallas
        const screenWelcome = document.getElementById('screen-welcome');
        const screenRegister = document.getElementById('screen-register');
        const screenDashboard = document.getElementById('screen-dashboard');
        const registerForm = document.getElementById('register-form');

        // START de portada a registro
        btnStart.addEventListener('click', () => {
            screenWelcome.classList.remove('active');
            setTimeout(() => {
                screenWelcome.style.display = 'none';
                screenRegister.style.display = 'flex';
                setTimeout(() => {
                    screenRegister.classList.add('active');
                }, 50);
            }, 500);
        });

        // Registro a Dashboard (Sin molestas alertas)
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            savedProfile = {
                alias: document.getElementById('alias').value,
                age: document.getElementById('age').value,
                hand: document.getElementById('hand').value,
                lang: selectLangInput.value
            };

            // Guardar localmente
            localStorage.setItem('hl_user_profile', JSON.stringify(profile = savedProfile));
            
            // Forzar actualización de textos traducidos con los datos dinámicos
            updateLanguage(savedProfile.lang);

            // Transición limpia de Pantalla 2 a Pantalla 3
            screenRegister.classList.remove('active');
            setTimeout(() => {
                screenRegister.style.display = 'none';
                screenDashboard.style.display = 'flex';
                setTimeout(() => {
                    screenDashboard.classList.add('active');
                }, 50);
            }, 500);
        });
    </script>
</body>
</html>
