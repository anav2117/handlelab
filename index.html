<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HandleLab</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            border: none;
            padding: 0;
            border-radius: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: none;
            overflow-y: auto;
            position: relative;
        }
        
        h1 { 
            margin: 0 0 2px 0; 
            font-size: 0.95rem; 
            text-align: center;
            color: #ff6600;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0;
            margin-bottom: 6px;
        }

        .form-group {
            margin-bottom: 6px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: #ff9933;
            margin-bottom: 2px;
            font-weight: bold;
        }

        input, select { 
            background: #1a1a1a; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 6px; 
            width: 100%; 
            box-sizing: border-box; 
            border-radius: 6px; 
            font-size: 12px; 
        }

        .btn { 
            background: linear-gradient(135deg, #ff3300, #ff6600, #ffcc00);
            color: #fff; 
            padding: 16px 24px; 
            border-radius: 14px; 
            border: 2px solid #ffcc00; 
            font-weight: 900; 
            width: 85%; 
            max-width: 320px;
            cursor: pointer; 
            font-size: 1.1rem; 
            text-align: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.9), 0 0 50px rgba(255, 140, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.5);
            animation: franticFire 1.2s infinite ease-in-out;
            position: relative;
            z-index: 10;
        }

        @keyframes franticFire {
            0% { 
                box-shadow: 0 0 20px rgba(255, 50, 0, 0.8), 0 0 40px rgba(255, 120, 0, 0.5); 
                transform: scale(1) translateY(0); 
                filter: brightness(1);
            }
            30% { 
                box-shadow: 0 0 35px rgba(255, 100, 0, 1), 0 0 65px rgba(255, 200, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.8); 
                transform: scale(1.05) translateY(-2px); 
                filter: brightness(1.2);
            }
            60% { 
                box-shadow: 0 0 45px rgba(255, 30, 0, 0.9), 0 0 80px rgba(255, 150, 0, 0.9); 
                transform: scale(1.03) translateY(1px); 
                filter: brightness(1.15);
            }
            100% { 
                box-shadow: 0 0 20px rgba(255, 50, 0, 0.8), 0 0 40px rgba(255, 120, 0, 0.5); 
                transform: scale(1) translateY(0); 
                filter: brightness(1);
            }
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #ff6600;
            color: #ff6600;
            margin-top: 6px;
            animation: none;
            box-shadow: none;
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            margin-top: 6px;
            font-size: 0.7rem;
            padding: 6px;
            animation: none;
            box-shadow: none;
            width: 100%;
        }

        .welcome-hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding-bottom: 40px;
            box-sizing: border-box;
            z-index: 2;
        }

        .flash-title-container {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .flash-typing-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ff6600;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(255, 102, 0, 0.9), 0 0 30px rgba(255, 69, 0, 0.8);
            border-right: 3px solid #ffcc00;
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCaret 0.75s step-end infinite;
        }

        @keyframes blinkCaret {
            from, to { border-color: transparent }
            50% { border-color: #ffcc00; }
        }

        .welcome-img-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            z-index: 1;
        }

        .welcome-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: intenseBallZoom 4s infinite alternate ease-in-out;
        }

        @keyframes intenseBallZoom {
            0% { transform: scale(1) translate(0, 0); filter: brightness(0.9) contrast(1.1); }
            50% { transform: scale(1.12) translate(-1%, -1%) rotate(0.5deg); filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 69, 0, 0.8)); }
            100% { transform: scale(1.08) translate(1%, 1%) rotate(-0.5deg); filter: brightness(1.1) drop-shadow(0 0 20px rgba(255, 140, 0, 0.7)); }
        }

        .fire-aura-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45vh;
            background: linear-gradient(to top, rgba(255, 40, 0, 0.75), rgba(255, 140, 0, 0.35), transparent);
            pointer-events: none;
            z-index: 5;
            animation: flameFlicker 1.5s infinite alternate ease-in-out;
        }

        @keyframes flameFlicker {
            0% { opacity: 0.6; transform: scaleY(0.95); }
            50% { opacity: 0.95; transform: scaleY(1.05); }
            100% { opacity: 0.75; transform: scaleY(1); }
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 20, 25, 0.95);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 8px;
        }

        .avatar-box {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #ff6600;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .user-info h2 {
            margin: 0;
            font-size: 0.9rem;
            color: #fff;
        }

        .user-info p {
            margin: 2px 0 0 0;
            font-size: 0.65rem;
            color: #ff9933;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .stat-card {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #333;
            padding: 6px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card span {
            display: block;
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-card strong {
            font-size: 0.9rem;
            color: #ff6600;
        }

        .xp-container {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #333;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .xp-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #ff9933;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .xp-bar-bg {
            background: #111;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #ffcc00);
            width: 0%;
            transition: width 0.5s ease;
        }

        .card-section {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #333;
            padding: 6px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.7rem;
        }

        .card-section h3 {
            margin: 0 0 2px 0;
            font-size: 0.75rem;
            color: #ff9933;
        }

        .video-container {
            flex: 1;
            min-height: 100px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff6600;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 6px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #distancia-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* El canvas de la guía no interfiere */
            z-index: 8;
        }

        .timer-overlay {
            position: absolute;
            top: 6px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #ff6600;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 1.1rem;
            color: #ff6600;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .controls-panel {
            background: rgba(20, 20, 25, 0.95);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #333;
            flex-shrink: 0;
        }
