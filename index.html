<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandleLab Pro - Interactive</title>
    <style>
        body { background: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; border: 2px solid #ff6600; padding: 20px; border-radius: 25px; background: rgba(20,20,25,0.9); text-align: center; }
        input { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; border-radius: 8px; }
        #timer { font-size: 3rem; color: #ff6600; font-weight: bold; }
        #counter { font-size: 1.5rem; color: #ff9933; margin: 10px 0; }
        .btn { background: #ff6600; color: black; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HandleLab</h1>
        <input type="text" id="username" placeholder="Tu nombre" onchange="usuario = this.value">
        <input type="number" id="custom-time" value="60">
        <div id="timer">00:00</div>
        <div id="counter">Botes: 0</div>
        <button class="btn" onclick="iniciarEntrenamiento()">INICIAR ENTRENAMIENTO</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let botes = 0, usuario = "Invitado", timer = null;
        const motivaciones = ["¡Vamos, sigue así!", "¡Más fuerte!", "¡No pares!", "¡Excelente ritmo!"];

        function playSound() {
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 400;
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function coachSay(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function iniciarEntrenamiento() {
            botes = 0;
            let tiempo = parseInt(document.getElementById('custom-time').value);
            
            timer = setInterval(() => {
                botes++;
                playSound(); // Sonido por cada bote
                document.getElementById('counter').innerText = "Botes: " + botes;
                
                // Motivación aleatoria cada 20 botes
                if (botes % 20 === 0) coachSay(motivaciones[Math.floor(Math.random() * motivaciones.length)]);
                
                if (--tiempo <= 0) {
                    clearInterval(timer);
                    coachSay("¡Tiempo terminado! Gran trabajo.");
                }
            }, 1000);
        }
    </script>
</body>
</html>
