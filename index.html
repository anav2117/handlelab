<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HandleLab</title>
    <style>
        body { background: #060810; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 10px 0; box-sizing: border-box; touch-action: manipulation; }
        .box { width: 95%; max-width: 400px; border: 2px solid #ff6600; padding: 10px; border-radius: 18px; background: rgba(10,10,15,0.98); display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        h1 { margin: 0 0 5px 0; font-size: 1.1rem; text-align: center; }

        /* Cámara con altura controlada para dejar espacio libre abajo */
        .video-container {
            width: 100%;
            height: 250px; 
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ff6600;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Reloj flotando en la parte superior dentro de la cámara */
        .timer-overlay {
            position: absolute;
            top: 8px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #ff6600;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 1.5rem;
            color: #ff6600;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .controls-panel {
            background: rgba(20, 20, 25, 0.95);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        input, select { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 8px; margin-bottom: 6px; width: 100%; box-sizing: border-box; border-radius: 8px; font-size: 13px; }
        
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.95rem; font-weight: bold; color: #ff9933; }
        
        .progreso-container { background: #111; height: 6px; border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .progreso-bar { height: 100%; background: #ff6600; width: 0%; transition: width 0.3s ease; }

        .bottom-bar { display: flex; gap: 8px; }
        .btn { background: #ff6600; color: #000; padding: 10px; border-radius: 8px; border: none; font-weight: 800; flex: 2; cursor: pointer; font-size: 14px; text-align: center; }
        .btn-share { background: #222; color: #fff; border: 1px solid #444; flex: 1; font-size: 12px; padding: 10px; }
        
        #historial { font-size: 0.7rem; text-align: left; color: #888; border-top: 1px solid #222; padding-top: 4px; margin-top: 6px; max-height: 35px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HandleLab</h1>
        
        <!-- Cámara en vertical optimizada -->
        <div class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
            <div id="timer" class="timer-overlay">00:00</div>
        </div>

        <!-- Panel de control completamente visible -->
        <div class="controls-panel">
            <input type="text" id="username" placeholder="Nombre del jugador" onchange="usuario = this.value">
            <select id="programa">
                <option value="60">Calentamiento (60s)</option>
                <option value="120">Intensidad Media (120s)</option>
                <option value="180">Élite (180s)</option>
            </select>
            
            <div class="stats-row">
                <span id="counter">Botes: 0</span>
            </div>
            <div class="progreso-container"><div id="progreso-bar" class="progreso-bar"></div></div>

            <div class="bottom-bar">
                <button class="btn" onclick="iniciarEntrenamiento()">INICIAR</button>
                <button class="btn btn-share" onclick="compartirResultados()">COMPARTIR</button>
            </div>
            
            <div id="historial"><ul id="lista-sesiones" style="margin:0; padding-left:12px;"></ul></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let botes = 0, usuario = "Invitado", timer = null;
        
        window.onload = function() {
            mostrarHistorial();
            iniciarCamara();
        };

        async function iniciarCamara() {
            const videoElement = document.getElementById('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 480 }, height: { ideal: 640 }, facingMode: "user" }
                });
                videoElement.srcObject = stream;
            } catch (error) {
                console.error("Error al acceder a la cámara: ", error);
            }
        }

        function playSound() {
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 400;
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function coachSay(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function iniciarEntrenamiento() {
            botes = 0;
            let tiempoTotal = parseInt(document.getElementById('programa').value);
            let tiempoRestante = tiempoTotal;
            document.getElementById('counter').innerText = "Botes: 0";
            
            actualizarDisplayTiempo(tiempoRestante);
            
            timer = setInterval(() => {
                botes++;
                tiempoRestante--;
                playSound();
                document.getElementById('counter').innerText = "Botes: " + botes;
                actualizarDisplayTiempo(tiempoRestante);
                
                let porcentaje = ((tiempoTotal - tiempoRestante) / tiempoTotal) * 100;
                document.getElementById('progreso-bar'].style.width = Math.min(porcentaje, 100) + "%";

                if (tiempoRestante <= 0) {
                    clearInterval(timer);
                    guardarSesion();
                    coachSay("¡Tiempo terminado! Gran sesión.");
                }
            }, 1000);
        }

        function actualizarDisplayTiempo(segundos) {
            let m = Math.floor(segundos / 60);
            let s = segundos % 60;
            document.getElementById('timer').innerText = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        function guardarSesion() {
            let historial = JSON.parse(localStorage.getItem('historialHandleLab') || "[]");
            historial.unshift({ usuario, botes, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('historialHandleLab', JSON.stringify(historial.slice(0, 3)));
            mostrarHistorial();
        }

        function mostrarHistorial() {
            const lista = document.getElementById('lista-sesiones');
            lista.innerHTML = "";
            let historial = JSON.parse(localStorage.getItem('historialHandleLab') || "[]");
            historial.forEach(s => {
                lista.innerHTML += `<li>${s.usuario}: ${s.botes} botes (${s.fecha})</li>`;
            });
        }

        function compartirResultados() {
            const programa = document.getElementById('programa').options[document.getElementById('programa'].selectedIndex].text;
            const texto = `🏀 ¡HandleLab! Sesión: ${programa}. Logré: ${botes} botes. ¡Atrévete a superarme!`;
            if (navigator.share) { navigator.share({ title: 'Mi récord HandleLab', text: texto }); } 
            else { prompt("Copia esto:", texto); }
        }
    </script>
</body>
</html>
