<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        /* Estilos Generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sistema de Pantallas y Transiciones (Fade) */
        .screen {
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* PANTALLA 1: PORTADA CON TU IMAGEN DE FONDO */
        #screen-welcome {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 50%, rgba(11,15,25,0.95) 90%), url('portada.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: flex-end;
            padding-bottom: 60px;
        }

        /* Botón START adaptado al diseño de la imagen */
        .btn-gradient {
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 50%, #cc0000 100%);
            color: #ffffff;
            border: none;
            padding: 16px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .btn-gradient:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }

        /* PANTALLA 2: REGISTRO PREMIUM */
        #screen-register {
            justify-content: center;
            padding: 30px;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            overflow-y: auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 102, 0, 0.2);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            margin-top: 0;
            color: #ff6600;
            font-size: 1.8rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card p {
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background-color: rgba(15, 23, 42, 0.8);
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 8px rgba(255, 102, 0, 0.3);
        }

        .form-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- PANTALLA 1: PORTADA CON IMAGEN DE FONDO -->
        <div id="screen-welcome" class="screen active">
            <button class="btn-gradient" id="btn-start">START</button>
        </div>

        <!-- PANTALLA 2: REGISTRO -->
        <div id="screen-register" class="screen">
            <div class="card">
                <h2>Crea tu Perfil</h2>
                <p>Configura tu perfil de entrenamiento</p>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="alias">Nombre / Alias</label>
                        <input type="text" id="alias" placeholder="Ej. Baller99" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="age">Edad</label>
                        <input type="number" id="age" min="5" max="99" placeholder="Tu edad" required>
                    </div>

                    <div class="form-group">
                        <div class="form-options">
                            <div>
                                <label for="hand">Mano Hábil</label>
                                <select id="hand" required>
                                    <option value="right">Derecha</option>
                                    <option value="left">Izquierda</option>
                                </select>
                            </div>
                            <div>
                                <label for="lang">Idioma</label>
                                <select id="lang" required>
                                    <option value="es">Español</option>
                                    <option value="en">Inglés</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-gradient" style="width: 100%; margin-top: 10px; font-size: 1.2rem;">Guardar y Empezar</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // Lógica de navegación entre pantallas
        const btnStart = document.getElementById('btn-start');
        const screenWelcome = document.getElementById('screen-welcome');
        const screenRegister = document.getElementById('screen-register');
        const registerForm = document.getElementById('register-form');

        // Al presionar START se oculta la portada y aparece el registro
        btnStart.addEventListener('click', () => {
            screenWelcome.classList.remove('active');
            setTimeout(() => {
                screenWelcome.style.display = 'none';
                screenRegister.style.display = 'flex';
                setTimeout(() => {
                    screenRegister.classList.add('active');
                }, 50);
            }, 500);
        });

        // Guardar perfil en memoria del celular (LocalStorage) al enviar formulario
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const profile = {
                alias: document.getElementById('alias').value,
                age: document.getElementById('age').value,
                hand: document.getElementById('hand').value,
                lang: document.getElementById('lang').value
            };

            // Guardar datos
            localStorage.setItem('hl_user_profile', JSON.stringify(profile));
            
            alert(`¡Perfil creado con éxito, ${profile.alias}! Datos guardados.`);
            
            // Aquí en los siguientes módulos conectaremos al menú principal o la cámara
        });
    </script>
</body>
</html>
