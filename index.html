<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        /* Estilos Generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #060810;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #060810;
        }

        /* Sistema de Pantallas y Transiciones (Fade) */
        .screen {
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* PANTALLA 1: PORTADA CON TU IMAGEN DE FONDO */
        #screen-welcome {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 50%, rgba(6,8,16,0.95) 90%), url('Screenshot_20260715_094703_ChatGPT.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: flex-end;
            padding-bottom: 60px;
        }

        /* Botón START */
        .btn-gradient {
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 50%, #cc0000 100%);
            color: #ffffff;
            border: none;
            padding: 16px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .btn-gradient:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }

        /* PANTALLA 2: REGISTRO PREMIUM */
        #screen-register {
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at center, #111625 0%, #060810 100%);
            overflow-y: auto;
        }

        .card {
            background: rgba(15, 20, 35, 0.85);
            border: 1px solid rgba(255, 102, 0, 0.25);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 102, 0, 0.05);
            text-align: center;
        }

        /* Icono decorativo de fuego para el título del formulario */
        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.6));
            animation: pulse-fire 1.5s infinite alternate;
        }

        @keyframes pulse-fire {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .card h2 {
            margin: 0 0 8px 0;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 30%, #ff8833 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0 0 28px 0;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #ff8833;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            background-color: #090d16;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        /* Efecto Glow Naranja al enfocar los campos */
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 12px rgba(255, 102, 0, 0.25);
            background-color: #0d1321;
        }

        .form-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Botón de envío Premium */
        .btn-submit {
            background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255, 85, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- PANTALLA 1: PORTADA CON IMAGEN DE FONDO -->
        <div id="screen-welcome" class="screen active">
            <button class="btn-gradient" id="btn-start">START</button>
        </div>

        <!-- PANTALLA 2: REGISTRO PREMIUM -->
        <div id="screen-register" class="screen">
            <div class="card">
                <div class="card-icon">🔥</div>
                <h2>Crea tu Perfil</h2>
                <p>Configura tu entrenamiento de IA</p>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="alias">Nombre / Alias</label>
                        <input type="text" id="alias" placeholder="Ej. Baller99" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="age">Edad</label>
                        <input type="number" id="age" min="5" max="99" placeholder="Tu edad" required>
                    </div>

                    <div class="form-group">
                        <div class="form-options">
                            <div>
                                <label for="hand">Mano Hábil</label>
                                <select id="hand" required>
                                    <option value="right">Derecha</option>
                                    <option value="left">Izquierda</option>
                                </select>
                            </div>
                            <div>
                                <label for="lang">Idioma</label>
                                <select id="lang" required>
                                    <option value="es">Español</option>
                                    <option value="en">Inglés</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Guardar y Empezar</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // Lógica de navegación entre pantallas
        const btnStart = document.getElementById('btn-start');
        const screenWelcome = document.getElementById('screen-welcome');
        const screenRegister = document.getElementById('screen-register');
        const registerForm = document.getElementById('register-form');

        // Al presionar START se oculta la portada y aparece el registro con efecto de desvanecimiento suave
        btnStart.addEventListener('click', () => {
            screenWelcome.classList.remove('active');
            setTimeout(() => {
                screenWelcome.style.display = 'none';
                screenRegister.style.display = 'flex';
                setTimeout(() => {
                    screenRegister.classList.add('active');
                }, 50);
            }, 500);
        });

        // Guardar perfil en memoria del celular (LocalStorage) al enviar formulario
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const profile = {
                alias: document.getElementById('alias').value,
                age: document.getElementById('age').value,
                hand: document.getElementById('hand').value,
                lang: document.getElementById('lang').value
            };

            // Guardar datos localmente
            localStorage.setItem('hl_user_profile', JSON.stringify(profile));
            
            alert(`¡Perfil creado con éxito, ${profile.alias}! Datos guardados en tu dispositivo.`);
            
            // Siguiente paso: Aquí redirigiremos al menú principal de entrenamiento
        });
    </script>
</body>
</html>
