<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HandleLab - Registration</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #060810;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 92%;
            max-width: 360px;
            height: 94vh;
            border: 2px solid #ff6600;
            padding: 12px;
            border-radius: 16px;
            background: rgba(10,10,15,0.98);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow-y: auto;
        }
        
        h1 { 
            margin: 0 0 4px 0; 
            font-size: 1.2rem; 
            text-align: center;
            color: #ff6600;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #ff9933;
            margin-bottom: 3px;
            font-weight: bold;
        }

        input, select { 
            background: #1a1a1a; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            border-radius: 6px; 
            font-size: 13px; 
        }

        .btn { 
            background: #ff6600; 
            color: #000; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 14px; 
            text-align: center;
            margin-top: 15px;
        }

        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        #register-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="box">
        <!-- Welcome Screen (English default) -->
        <div id="welcome-screen">
            <h1>🏀 HANDLELAB</h1>
            <p style="font-size: 0.85rem; color: #ccc; margin: 20px 0;">Master your handle, elevate your game, and become an elite handler.</p>
            <button class="btn" onclick="showRegister()">GET STARTED</button>
        </div>

        <!-- Registration Screen (Module 1) -->
        <div id="register-screen">
            <h1>MODULE 1</h1>
            <p class="subtitle">Player Registration</p>
            
            <div class="form-group">
                <label>🌍 Language</label>
                <select id="reg-idioma">
                    <option value="en" selected>English</option>
                    <option value="es">Español</option>
                </select>
            </div>

            <div class="form-group">
                <label>👤 Alias / Name</label>
                <input type="text" id="reg-alias" placeholder="E.g. AlexHoop">
            </div>

            <div class="form-group">
                <label>🎂 Age</label>
                <input type="number" id="reg-edad" placeholder="E.g. 16" min="6" max="99">
            </div>

            <div class="form-group">
                <label>✋ Dominant Hand</label>
                <select id="reg-mano">
                    <option value="Right">Right</option>
                    <option value="Left">Left</option>
                    <option value="Ambidextrous">Ambidextrous</option>
                </select>
            </div>

            <div class="form-group">
                <label>📊 Current Level</label>
                <select id="reg-nivel">
                    <option value="Rookie">Rookie (Beginner)</option>
                    <option value="Starter">Starter (Intermediate)</option>
                    <option value="Hooper">Hooper (Advanced)</option>
                    <option value="Elite Handler">Elite Handler (Professional)</option>
                </select>
            </div>

            <button class="btn" onclick="saveUserRegistration()">REGISTER</button>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('register-screen').style.display = 'flex';
        }

        function saveUserRegistration() {
            const idioma = document.getElementById('reg-idioma').value;
            const alias = document.getElementById('reg-alias').value.trim();
            const edad = document.getElementById('reg-edad').value;
            const mano = document.getElementById('reg-mano').value;
            const nivel = document.getElementById('reg-nivel').value;

            if (!alias || !edad) {
                alert("Please fill in your alias and age.");
                return;
            }

            const playerProfile = {
                idioma,
                alias,
                edad,
                mano,
                nivel,
                registrationDate: new Date().toLocaleDateString()
            };

            localStorage.setItem('handlelab_user', JSON.stringify(playerProfile));

            alert(`Registration successful! Welcome to HandleLab, ${alias}.`);
            location.reload(); 
        }
    </script>
</body>
</html>
