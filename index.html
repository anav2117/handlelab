<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        body { margin: 0; background-color: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #app { width: 100%; max-width: 400px; }
        .box { border: 2px solid #ff6600; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #ff6600; margin-top: 0; }
        #timer { font-size: 2rem; margin: 10px 0; color: #fff; }
        .btn { background: #ff6600; border: none; padding: 15px; color: white; border-radius: 10px; font-size: 1rem; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .level-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="box">
            <h1>HandleLab</h1>
            <div id="timer">00:00</div>
            
            <div class="level-grid" id="controls">
                <button class="level-btn" onclick="iniciarNivel(1, 90, 60, 'Nivel 1, mano derecha. ¡Vamos, tú puedes!')">Nivel 1 (60s)</button>
                <button class="level-btn" onclick="iniciarNivel(2, 90, 60, 'Nivel 2, mano izquierda. Concentrado.')">Nivel 2 (60s)</button>
                <button class="level-btn" onclick="iniciarNivel(3, 110, 45, 'Nivel 3, alterna manos. ¡Dale ritmo!')">Nivel 3 (45s)</button>
                <button class="level-btn" onclick="detenerEntrenamiento()" style="background:#550000">STOP</button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let interval = null;
        let timerInterval = null;
        let timeLeft = 0;

        function decir(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            const voces = window.speechSynthesis.getVoices();
            msg.voice = voces[1] || voces[0]; 
            window.speechSynthesis.speak(msg);
        }

        function actualizarTemporizador() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft === Math.floor(document.getElementById('timer').dataset.total / 2)) {
                decir("¡Vas muy bien, mantén la intensidad!");
            }

            if (timeLeft <= 0) {
                detenerEntrenamiento();
                decir("¡Excelente trabajo! Has completado el ejercicio.");
            } else {
                timeLeft--;
            }
        }

        function iniciarNivel(num, bpm, duracion, instruccion) {
            detenerEntrenamiento();
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            timeLeft = duracion;
            document.getElementById('timer').dataset.total = duracion;
            
            decir(instruccion);
            interval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 150;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }, (60000 / bpm));

            timerInterval = setInterval(actualizarTemporizador, 1000);
            actualizarTemporizador();
        }

        function detenerEntrenamiento() {
            clearInterval(interval);
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
