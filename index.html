<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        body { margin: 0; background-color: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #app { width: 100%; max-width: 400px; }
        .box { border: 2px solid #ff6600; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #ff6600; margin-top: 0; }
        .section-title { font-size: 1.2rem; margin: 20px 0 10px; color: #ff9933; text-align: left; }
        .btn { background: #ff6600; border: none; padding: 15px; color: white; border-radius: 10px; font-size: 1rem; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .level-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="box">
            <h1>HandleLab</h1>
            
            <div class="section-title">Reto de Hoy</div>
            <button class="btn" onclick="iniciarNivel(4, 150, 'Reto de 100 botes iniciado. Ritmo rápido.')">INICIAR RETO: 100 BOTES</button>

            <div class="section-title">Mapa de Niveles</div>
            <div class="level-grid">
                <button class="level-btn" onclick="iniciarNivel(1, 90, 'Nivel 1. Mano derecha. Mantén el ritmo.')">Nivel 1</button>
                <button class="level-btn" onclick="iniciarNivel(2, 90, 'Nivel 2. Mano izquierda. Vamos.')">Nivel 2</button>
                <button class="level-btn" onclick="iniciarNivel(3, 110, 'Nivel 3. Alternando manos.')">Nivel 3</button>
                <button class="level-btn" onclick="iniciarNivel(0, 0, 'Detenido.')">STOP</button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let interval = null;

        function decir(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            const voces = window.speechSynthesis.getVoices();
            msg.voice = voces[1] || voces[0]; 
            window.speechSynthesis.speak(msg);
        }

        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 150;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function iniciarNivel(num, bpm, instruccion) {
            clearInterval(interval); // Detiene cualquier ritmo anterior
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            decir(instruccion);
            
            if (bpm > 0) {
                interval = setInterval(playSound, (60000 / bpm));
            }
        }
    </script>
</body>
</html>
