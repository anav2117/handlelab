<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        body { margin: 0; background-color: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #app { width: 100%; max-width: 400px; }
        .box { border: 2px solid #ff6600; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #ff6600; margin-top: 0; }
        #timer { font-size: 3rem; margin: 5px 0; color: #fff; font-weight: bold; }
        #counter { font-size: 1.5rem; color: #ff9933; margin-bottom: 15px; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .level-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; }
        .level-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stop-btn { background: #550000; border: 1px solid #770000; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="box">
            <h1>HandleLab</h1>
            <div id="timer">00:00</div>
            <div id="counter">Botes: 0</div>
            <div class="level-grid" id="grid">
                <button class="level-btn" onclick="iniciarNivel(1, 90, 60, 'Nivel 1, mano derecha.')">Nivel 1</button>
                <button class="level-btn" onclick="iniciarNivel(2, 90, 60, 'Nivel 2, mano izquierda.')">Nivel 2</button>
                <button class="level-btn" onclick="iniciarNivel(3, 110, 45, 'Nivel 3, alterna manos.')">Nivel 3</button>
                <button class="level-btn" onclick="iniciarNivel(4, 130, 30, 'Nivel 4, alta intensidad.')">Nivel 4</button>
            </div>
            <button class="stop-btn" onclick="detenerEntrenamiento()">STOP</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let interval = null, timerInterval = null, timeLeft = 0, botes = 0, descansando = false;

        function decir(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            const voces = window.speechSynthesis.getVoices();
            // Prioridad a voz masculina
            msg.voice = voces.find(v => v.name.includes("Male") || v.name.includes("masculino")) || voces[0];
            window.speechSynthesis.speak(msg);
        }

        function iniciarNivel(num, bpm, duracion, instruccion) {
            if (descansando) return;
            detenerEntrenamiento();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            timeLeft = duracion;
            botes = 0;
            document.getElementById('counter').innerText = "Botes: 0";
            decir(instruccion);
            
            interval = setInterval(() => {
                botes++;
                document.getElementById('counter').innerText = "Botes: " + botes;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 150;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }, (60000 / bpm));

            timerInterval = setInterval(actualizarTemporizador, 1000);
            actualizarTemporizador();
        }

        function actualizarTemporizador() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                finalizarNivel();
            } else {
                timeLeft--;
            }
        }

        function finalizarNivel() {
            detenerEntrenamiento();
            descansando = true;
            document.querySelectorAll('.level-btn').forEach(b => b.disabled = true);
            decir(`¡Excelente! Terminaste con ${botes} botes. Descansa 15 segundos.`);
            
            let descanso = 15;
            let dInt = setInterval(() => {
                document.getElementById('timer').innerText = `D: ${descanso--}`;
                if (descanso < 0) {
                    clearInterval(dInt);
                    descansando = false;
                    document.getElementById('timer').innerText = "00:00";
                    document.querySelectorAll('.level-btn').forEach(b => b.disabled = false);
                    decir("Descanso terminado. ¡Listo para el siguiente nivel!");
                }
            }, 1000);
        }

        function detenerEntrenamiento() {
            clearInterval(interval);
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
