<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandleLab AI Coach</title>
    <style>
        body { margin: 0; background-color: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 400px; padding: 20px; }
        .box { border: 2px solid #ff6600; padding: 30px; border-radius: 20px; text-align: center; background: rgba(0,0,0,0.5); }
        h1 { color: #ff6600; margin-top: 0; }
        .btn { background: #ff6600; border: none; padding: 15px 30px; color: white; border-radius: 10px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="box">
            <h1>HandleLab</h1>
            <p id="message">¡Entrenador listo! Presiona el botón para empezar tu sesión.</p>
            <button class="btn" onclick="iniciarSesion()">INICIAR SESIÓN</button>
        </div>
    </div>

    <script>
        function iniciarSesion() {
            document.getElementById('message').innerText = "¡Excelente, vamos a darle! Mantén el ritmo.";
            decir("¡Vamos a entrenar! Mantén el ritmo con el balón.");
        }

        function decir(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
