<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandleLab Pro Ultimate</title>
    <style>
        /* Estilos mejorados para un look más profesional */
        body { background: #060810; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; border: 2px solid #ff6600; padding: 20px; border-radius: 25px; background: rgba(20,20,25,0.8); text-align: center; }
        .input-group { margin: 15px 0; }
        input, select { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #ff6600; text-shadow: 0 0 10px rgba(255,102,0,0.5); }
        .action-btn { background: #ff6600; border: none; color: black; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { transform: scale(1.02); background: #ff8833; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HandleLab</h1>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Nombre del jugador" onchange="cambiarUsuario(this.value)">
        </div>

        <div class="input-group">
            <label>Tiempo (segundos):</label>
            <input type="number" id="custom-time" value="60">
        </div>

        <div id="timer">00:00</div>
        <div id="counter">Botes: 0</div>
        
        <button class="action-btn" onclick="iniciarDesafio()">INICIAR DESAFÍO</button>
    </div>

    <script>
        let usuarioActual = "Invitado";
        
        function cambiarUsuario(nombre) {
            usuarioActual = nombre || "Invitado";
            console.log("Perfil cambiado a: " + usuarioActual);
        }

        function iniciarDesafio() {
            const tiempo = document.getElementById('custom-time').value;
            // Aquí integrarías la lógica de temporizador con el usuarioActual
            // Guardando récords en: 'best_' + usuarioActual + '_lv_' + nivelActual
            alert("Iniciando desafío para " + usuarioActual + " por " + tiempo + " segundos.");
        }
    </script>
</body>
</html>
