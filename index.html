<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandleLab Pro</title>
    <style>
        body { background: #060810; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; border: 2px solid #ff6600; padding: 20px; border-radius: 25px; background: rgba(20,20,25,0.9); text-align: center; }
        input { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        #timer { font-size: 3rem; color: #ff6600; font-weight: bold; }
        #counter { font-size: 1.5rem; color: #ff9933; margin: 10px 0; }
        #badge { font-size: 1.2rem; color: #ffd700; height: 30px; margin-bottom: 10px; }
        .btn { background: #ff6600; color: black; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>HandleLab</h1>
        <input type="text" id="username" placeholder="Tu nombre" onchange="guardarUsuario(this.value)">
        <input type="number" id="custom-time" value="60" placeholder="Tiempo en segundos">
        <div id="badge"></div>
        <div id="timer">00:00</div>
        <div id="counter">Botes: 0</div>
        <button class="btn" onclick="iniciarDesafio()">INICIAR ENTRENAMIENTO</button>
    </div>

    <script>
        let botes = 0, usuario = "Invitado", timer = null;

        function guardarUsuario(val) { usuario = val; }

        function iniciarDesafio() {
            let tiempo = parseInt(document.getElementById('custom-time').value);
            botes = 0;
            document.getElementById('badge').innerText = "";
            
            timer = setInterval(() => {
                botes++;
                document.getElementById('counter').innerText = "Botes: " + botes;
                checkMedallas(botes);
                if (--tiempo <= 0) finalizar();
            }, 1000);
        }

        function checkMedallas(n) {
            let badgeDiv = document.getElementById('badge');
            if (n === 50) badgeDiv.innerText = "🏆 Pro Dribbler";
            if (n === 100) badgeDiv.innerText = "🔥 Elite Master";
        }

        function finalizar() {
            clearInterval(timer);
            // Guardar récord del usuario específico
            localStorage.setItem(`record_${usuario}`, Math.max(localStorage.getItem(`record_${usuario}`) || 0, botes));
            alert(`¡Entrenamiento terminado! Récord de ${usuario}: ${botes} botes.`);
        }
    </script>
</body>
</html>
